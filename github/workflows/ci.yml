name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from ragetype import RageDetector, RAGE_LEVELS, ALL_KEYS; print('Core imports OK')"
          python -c "from ragetype import SoundManager; print('SoundManager import OK')"

      - name: Test rage detector logic
        run: |
          python -c "
          from ragetype import RageDetector
          import time

          rd = RageDetector(sensitivity=1.0)

          # Simulate keystrokes
          for i in range(30):
              level = rd.record_keystroke()
              time.sleep(0.02)

          data = rd.get_display_data()
          assert data['total'] == 30, f'Expected 30 keystrokes, got {data[\"total\"]}'
          assert data['peak'] > 0, 'Peak should be > 0'
          print(f'Rage detector OK: {data}')
          "

  build-exe:
    runs-on: windows-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller

      - name: Build executable
        run: python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RageType-Windows
          path: dist/RageType.exe